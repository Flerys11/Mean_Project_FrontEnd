<div class="blank-layout-container justify-content-center">
  <div class="auth-wrapper">
    <div class="position-relative shaper-wrapper">
      <div class="w-100 position-relative rounded bg-white auth-card">
        <div class="auth-body">

          <button
            mat-icon-button
            color="primary"
            class="m-t-20"
            (click)="goBack()">

            <mat-icon>arrow_back</mat-icon>

          </button>

          <div class="row">
            <div class="col-lg-6">
              <div class="align-items-center justify-content-center d-none d-lg-flex">
                <img src="/assets/images/logos/signi_in.png" alt="login" style="max-width: 500px" />
              </div>
            </div>
            <div class="col-lg-6">
              <div class="d-flex align-items-start align-items-lg-center justify-content-center">
                <div class="row justify-content-center w-100">
                  <div class="col-lg-11">
                    <h4 class="f-w-700 f-s-30 lh-base m-0">
                      Welcome to Signin
                    </h4>
                    <span class="f-s-14 d-block mat-body-1 m-t-8">Your Admin Dashboard</span>

                    <div class="row m-t-24">
                      <div class="col-12 col-sm-6">
                        <button mat-stroked-button class="w-100 m-b-4">
                          <div class="d-flex align-items-center">
                            <img src="/assets/images/svgs/google-icon.svg" alt="google" width="16" class="m-r-8" />
                            Sign up with Google
                          </div>
                        </button>
                      </div>
                      <div class="col-12 col-sm-6">
                        <button mat-stroked-button class="w-100 d-flex align-items-center m-b-4">
                          <div class="d-flex align-items-center">
                            <img src="/assets/images/svgs/facebook-icon.svg" alt="facebook" width="40" class="m-r-4" />
                            Sign up with FB
                          </div>
                        </button>
                      </div>
                    </div>

                    <div class="or-border m-t-30">or sign up with</div>

                    <div class="container d-flex justify-content-center align-items-center vh-100">

                      <mat-card style="width: 450px; padding: 20px;">

                        <h2 class="text-center mb-4">Inscription</h2>

                        <form [formGroup]="form" (ngSubmit)="submit()">

                          <!-- Nom boutique -->
                          <mat-form-field appearance="outline" class="w-100 m-b-16">
                            <mat-label>Choisir une boutique</mat-label>
                            <mat-select formControlName="nom_boutique">

                              <mat-option *ngFor="let boutique of boutiques"
                                          [value]="boutique.nom">
                                {{ boutique.nom }}
                              </mat-option>

                            </mat-select>
                          </mat-form-field>

                          <mat-form-field appearance="outline" class="w-100 m-b-16">
                            <mat-label>Type de boutique</mat-label>
                            <mat-select formControlName="type_boutique">
                              <mat-option *ngFor="let type_boutique of type_boutiques"
                                          [value]="type_boutique._id">
                                {{ type_boutique.nom }}
                              </mat-option>
                            </mat-select>
                          </mat-form-field>

                          <!-- Email -->
                          <mat-form-field appearance="outline" class="w-100 mb-3">
                            <mat-label>Email</mat-label>
                            <input matInput type="email" formControlName="email">
                          </mat-form-field>

                          <!-- Mot de passe -->
                          <mat-form-field appearance="outline" class="w-100 mb-3">
                            <mat-label>Mot de passe</mat-label>
                            <input matInput type="password" formControlName="mot_de_passe">
                          </mat-form-field>

                          <!-- Contact -->
                          <mat-form-field appearance="outline" class="w-100 mb-3">
                            <mat-label>Contact (10 chiffres)</mat-label>
                            <input matInput formControlName="contact">
                          </mat-form-field>

                          <!-- Erreur -->
                          <div *ngIf="errorMessage" class="text-danger mb-3">
                            {{ errorMessage }}
                          </div>

                          <!-- Bouton -->
                          <button mat-raised-button
                                  color="primary"
                                  class="w-100"
                                  [disabled]="loading">

                            {{ loading ? 'Inscription...' : 'S’inscrire' }}

                          </button>

                        </form>

                      </mat-card>

                    </div>
                    <span class="d-block f-w-500 d-block m-t-24">Already have an Account?

                      <a [routerLink]="['/authentication/login']"
                        class="text-decoration-none text-primary f-w-500 f-s-14">
                        Sign In</a>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
