<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="header-commandes">
      <div class="d-flex align-items-center gap-2">
        <mat-icon color="primary">shopping_cart</mat-icon>
        <div>
          <h3 class="m-0 fw-semibold">Commandes</h3>
          <span class="text-muted">
          Liste des commandes clients
        </span>
        </div>
      </div>
    </div>

    <table mat-table [dataSource]="dataSource" class="w-100">
        <ng-container matColumnDef="client">
          <th mat-header-cell *matHeaderCellDef> Client </th>
          <td mat-cell *matCellDef="let element">
            <strong>{{ element.nom_client }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="contact">
          <th mat-header-cell *matHeaderCellDef> Contact </th>
          <td mat-cell *matCellDef="let element">
            {{ element.contact_client }}
          </td>
        </ng-container>

        <ng-container matColumnDef="adresse">
          <th mat-header-cell *matHeaderCellDef> Adresse </th>
          <td mat-cell *matCellDef="let element">
            {{ element.adresse_client }}
          </td>
        </ng-container>

        <ng-container matColumnDef="articles">
          <th mat-header-cell *matHeaderCellDef> Articles </th>
          <td mat-cell *matCellDef="let element">
            {{ getTotalArticles(element) }} article(s)
          </td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let element">
            {{ element.createdAt | date:'dd/MM/yyyy HH:mm' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let element">
            <div class="action-buttons">
              <button mat-raised-button color="primary" (click)="openDetail(element)">
                <mat-icon>visibility</mat-icon>
                Voir
              </button>

              <button mat-raised-button color="accent" (click)="valider(element)">
                <mat-icon>check_circle</mat-icon>
                Valider
              </button>

              <button mat-raised-button color="warn" (click)="annuler(element)">
                <mat-icon>cancel</mat-icon>
                Annuler
              </button>
            </div>
          </td>
        </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumnsWithActions"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumnsWithActions"></tr>
    </table>
  </mat-card-content>
  </mat-card>
