<div class="row mb-3">
  <div class="col-12">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Choisir un article</mat-label>
      <mat-select [value]="selectedArticle?._id" (selectionChange)="onArticleChange($event)">
        <mat-option *ngFor="let article of articles" [value]="article._id">
          {{ article.nom_article }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</div>

<ng-container *ngIf="selectedArticle">
  <div class="row">
    <div class="col-lg-8">
      <app-stat-total-by-article
        *ngIf="selectedArticle"
        [idArticle]="selectedArticle._id"
        [nomArticle]="selectedArticle.nom_article">
      </app-stat-total-by-article>
    </div>
    <div class="col-lg-4">
      <app-traffic-distribution-by-article
        *ngIf="selectedArticle"
        [idArticle]="selectedArticle._id"
        [nomArticle]="selectedArticle.nom_article">
      </app-traffic-distribution-by-article>
      <app-product-sales-by-article
        *ngIf="selectedArticle"
        [idArticle]="selectedArticle._id"
        [nomArticle]="selectedArticle.nom_article">
      </app-product-sales-by-article>
    </div>
  </div>
</ng-container>
