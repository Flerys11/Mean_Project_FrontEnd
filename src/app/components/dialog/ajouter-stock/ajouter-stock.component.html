<h2 mat-dialog-title>
  Ajouter du stock
</h2>

<form [formGroup]="form" mat-dialog-content>

  <mat-form-field class="w-100">
    <mat-label>Quantité entrée</mat-label>
    <input matInput type="number" formControlName="quantite_entree" />
    <mat-error *ngIf="form.get('quantite_entree')?.invalid">
      Quantité invalide
    </mat-error>
  </mat-form-field>

</form>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Annuler</button>
  <button
    mat-raised-button
    color="primary"
    (click)="save()"
    [disabled]="form.invalid">
    Enregistrer
  </button>
</mat-dialog-actions>
