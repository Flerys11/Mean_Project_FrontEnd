<h2 mat-dialog-title>{{ data.title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>

    <ng-container *ngFor="let field of data.fields">

      <mat-form-field class="w-100" *ngIf="field.type === 'text' || field.type === 'number'">
        <mat-label>{{ field.label }}</mat-label>
        <input matInput [type]="field.type" [formControlName]="field.name">
      </mat-form-field>

      <mat-form-field class="w-100" *ngIf="field.type === 'select'">
        <mat-label>{{ field.label }}</mat-label>
        <mat-select [formControlName]="field.name">
          <mat-option *ngFor="let option of field.options" [value]="option._id">
            {{ option.nom }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div *ngIf="field.type === 'file'" class="mb-3">
        <label>{{ field.label }}</label>
        <input type="file" multiple (change)="onFileSelected($event)">
      </div>

    </ng-container>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="close()">Annuler</button>
    <button mat-raised-button color="primary" type="submit">
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
