<div class="d-flex justify-content-between mb-3">
    <h2>Boutiques</h2>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        Ajouter
    </button>
</div>
<ng-container *ngIf="boutiques && boutiques.length >= 0; else loading">
    <table mat-table [dataSource]="boutiques" class="w-100">

        <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let element">
                {{ element.nom }}
            </td>
        </ng-container>

        <ng-container matColumnDef="prix_loyer">
            <th mat-header-cell *matHeaderCellDef>Prix Loyer</th>
            <td mat-cell *matCellDef="let element">
                {{ element.prix_loyer }}
            </td>
        </ng-container>

        <ng-container matColumnDef="validate">
            <th mat-header-cell *matHeaderCellDef>Validé</th>
            <td mat-cell *matCellDef="let element">

      <span *ngIf="element.validate"
            style="color: green; font-weight: 600;">
        Oui
      </span>

                <span *ngIf="!element.validate"
                      style="color: red; font-weight: 600;">
        Non
      </span>

            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let element">
                <button mat-icon-button [matMenuTriggerFor]="menu">
                    <mat-icon>more_vert</mat-icon>
                </button>

                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEditDialog(element)">
                        <mat-icon>edit</mat-icon>
                        <span>Edit</span>
                    </button>
                    <button mat-menu-item (click)="deleteBoutique(element._id)">
                        <mat-icon>delete</mat-icon>
                        <span>Delete</span>
                    </button>
                </mat-menu>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
</ng-container>

<ng-template #loading>
    <div class="text-center p-4">
        <mat-spinner diameter="40"></mat-spinner>
        <p class="mt-2">Chargement des boutiques...</p>
    </div>
</ng-template>
